body:
  text: 快全口問今表兩題見其意如何答約發心修行表兩題也難云今兩題約兩部立之見其故凡題一部總稱所釋法門悉可在題名然所釋中兩部法門交參明之就中被引證文時證大日經三句法門等爾者題可有兩部義門若有之者今題約兩部立二名事明也隨而初云金剛頂瑜伽是金剛界十八會通名也次題云總持教門是胎藏名字也大師付法傳云毗盧遮那總持陀羅尼法門文爾者如何答初題云發阿耨心是偏發心義門也次題云瑜伽總持修持義明修行義故知約發心修行二義立兩題見下解釋如人貪名官修菩提行文此意發心修行見但至所釋兩部交參勿論也釋金界義門因明胎藏義門歟例如胎藏部中有金界法門爾者以是可置題義無相違若又約一邊定題事有例證歟若又發心修行義各通兩部見不可違所釋歟次金剛頂开總持名字事先今書金剛頂部治定了𥳑之金剛名字無子細總持名字事不可𥳑金剛頂部陀羅尼翻名也總持者總者總攝持者任持義也分別聖位經真言陀羅尼宗文重難云如御義者初題約發心事一往聞於次題名者不局修行云說菩提心故爾者何可云偏約修行耶如何重會云必非云發菩提心為顯菩提心上行事云說菩提心觀行等也仍無過問大師以今論為密藏肝心意如何答明顯密差別淺深故也難云自宗意以即身成佛為深旨而今論唯真言法中等文此意分明也依之為密藏肝心見如何答大師以今論為密藏肝心事其意趣實難知但所任解釋也彼釋此論皆說此中文仍顯密二教優劣淺深說之故為密藏肝心見但聞分違大師解釋歟難云大師御釋必非依辨顯密二教差別為密藏肝心解釋意密藏肝心論故說顯密差別見是則說即身成佛深旨論故為密藏肝心是說自宗不共實義時顯密對辨顯實義故自顯淺深云意歟爾何云違大師御釋耶其上案道理時辨教權實為密藏肝心述即身成佛義不可云肝心付道理難思如何會云云云問舉兩題見爾者兩題各通兩部可云耶答不爾此論義題名通歟局歟尋也為意得記之難云金剛頂名字必不限金剛頂經其故大師一處御釋中頂者最頂義等文瑜伽言又通兩部次題總持言是又不可局胎藏爾者尤可通兩部若又文別屬者金剛頂金剛部瑜伽者胎藏部名瑜伽宗故次題中瑜伽金剛界也是祖師御釋言瑜伽者是金剛頂經也文總持者胎藏也如何答兩部名字不可混亂故金剛頂等名字不可云通胎藏胎藏部名金剛頂證據何耶但至了𥳑者雖義通立名字時限金剛界事常習也次總持事實可通但今約胎藏可見之歟𠰥又一義邊是金剛頂經能修人修行義得意者可云一具金剛頂義故無相違問阿耨三菩提心文爾限三摩地菩提心可云耶答不爾通三種歟難云大師御釋中明四種心時信心大悲心勝義心大菩提心四種心舉之故菩提心名字正名大菩提心仍今可局第三菩提心歟就中勝義行願二心一往亘常途義門故不可置此中如何答可通三種也其故菩提心者一向志求一切智智必當普度法界衆生自利利他心品也爾者勝義行願二心尤此意也隨而於釋段三種共與菩提心名又所釋二心不可漏題名但大師御釋總即別名歟仍無失難云通樣如何會云今無上覺總稱第三正覺勝義行願等覺行願心正覺三摩地勝義心問大阿闍梨云文指誰人乎答云指金剛薩埵也難云凡自宗意以法身說法為規模故專𥳑舉自性法身說其上根本大日如來所說也爾者尤可舉大日如來大方大日名阿闍梨事疏十三毗盧遮那是名阿闍梨文大師十住心論初從大日尊下至青龍阿闍梨有七葉大阿闍梨耶文今舉大日如來事例如百法論云如世尊言彌勒無二代舉根本也如何答自宗以師資相承為宗義依之祖師成尊纂要舉十種殊勝中云相承殊勝大師時時述嫡嫡相承旨大師御釋付法傳云嫡嫡相續迄今不絶文仍今述嫡嫡相承旨時舉龍樹直師金剛薩埵也但至難者百法論例證顯密事異故難準例次可約根本事必非所詮歟此事指金智難事可有之歟是不空集得意義通歟又指妙吉祥義可有之歟是他門相承次第也又指龍猛義可有之歟是譯者置詞可見也問今論阿耨文所言菩提心限心王菩提心可云耶答不爾也難云下明心王菩提心我今志求文今全同也其上心𢿘菩提心難名無上正等正覺如何答一部總稱也何可漏心𢿘菩提心乎但聞分通中一邊也此事若限心王菩提心可違諸尊皆同大毗盧遮那佛身文歟問今論具有序正流通三分可云耶答有正宗流通可答申也此事御談義時可有正宗歟云云難云今論密藏肝心論被釋三密精要故但可有正宗也凡論章疏中置三段事不定也或有正宗無序分流通事有之如百法論爾者如何答見論文意趣終一頌流通見爾者有正宗流通事分明也但正宗有之例事是又不可遮次明三密精要故正宗可有之事是又不爾如大日經三段具有之金剛頂經有序正蘇悉地經有正宗流通何可明三密精要故無三段耶仍無失賴瑜御房有正宗義為正答是偏任問答鈔歟難云若人等頌文大師祕藏寶鑰第三菩提心一具引之故必不見流通是知歎第三菩提心文也何以之為流通耶問今論分文段從初大阿闍梨至闕而不書為略釋次從一者行願以下為廣釋大一論分廣略二段可云耶答不爾難云從初至闕而不書略釋菩提心相見一者行願下具分三種行相委釋之見爾者如何答一論意初表師說顯密教意以口說不自由事𠰥有下明菩提心相既發如是心後明行相見問大阿闍梨云文爾者大阿闍梨言至何文段也可云耶答一部皆大阿闍梨口說也難云今論是龍猛菩薩造也難云一部皆大阿闍梨口說既云龍猛菩薩造爾者阿闍梨云言可局文段仍從初至闕而不書為阿闍梨言是則舉阿闍梨說略釋之後師說上重設廣釋𠰥又至宜修佛乘可為師說爾者為一部𢗫大阿闍梨言事難思如何答自宗意以師資相承為本故三種菩提心行相皆以師說述之故表阿闍梨云爾者不可云分文段其上無師說私說起盡也但龍猛論故非一部悉阿闍梨詞云云是又不爾師口說龍猛述之故非龍猛所造耶次文段分齊事強解釋無起盡仍無失難云若如答說者一向是直師金薩說非龍猛造𠰥爾者難云龍猛所造歟爾述師口說故可龍猛造云云是又難思若依師口說述今詞者是只龍猛詞也非師詞𠰥又舉師口說此上被重述私義者尤如所難可分文段歟其上云龍猛菩薩造此意非必述直師說師說外私造之故置造言歟次師說可為本故云云縱切文段得意何師說為本義無之乎會云表大阿闍梨云意指一部論意也必大阿闍梨言各別無之是阿闍梨口說龍猛述之故是云龍猛菩薩造也問外道二乘法文所云外道二乘中九種住心具有之可云乎答爾也問外道文今此外道可通九種住心乎答可限世閒三種也難云今此外道名字有通局中對真言最上法云外道法可知通九種住心教法事是以疏家不了內證祕密法者皆是外道文真言問答外道分內外兩種外道內外道中盡四家大乘見爾者今重舉二乘事約過重別舉聲緣二乘也如何答今書下外道等戀其身命文是更不見指九種住心仍今外道世間三個住心分齊也是則二乘大小二乘也仍外道與二乘合可廣盡九種住心也但真言法所對故外道言可廣通云云自元真言所對故二乘外道言盡之何外道處盡之云乎次通局事是又非可遮雖爾今其意趣各別也問無惑者文所言惑者偏指疑惑心可云耶答爾也難云惑言必非指疑惑見惑總煩惱名字也爾者可總指煩惱也是則𥳑取煩惱微薄人解釋意也御請來録云薄命不聞名重垢不能入文此意一具也如何答自宗無上最上乘教故不𥳑煩惱厚薄不分業障輕重一生成佛是宗義也爾者何今解釋𥳑取煩惱微薄人是以六度經𠰥彼有情文疏家第一卷二乘實際文大師十住心論四藏之藥文爾者無疑心云無惑事明白也是雖煩惱業深厚信力堅固無疑惑心人為真言正機又雖上根上智人於真言不生𣵫信輩不可修無上最上佛乘見惑言名疑惑事慈恩大師釋猶豫名惑文𠰥總指煩惱者凡衆生十法同時具之名衆生何機無煩惱機根有之耶總簡具煩惱人云事還難思也但重垢不能入解釋約疑心可見也難云如答說者縱雖上根上智無大度量有疑惑者不可修佛乘爾上根上智者信等五根利云上根其中慧根殊勝云上智見已上根上智者信力堅固可有度量何上根上智有疑惑心人有之可云乎此對辨大不審也爾者煩惱不依根利鈍具之故今取煩惱微薄人見但聞釋文等皆約已作業鄣可見故無相違次衆生十法同時具之故無煩惱機根不可有之事一往爾也但今取微薄人意歟如何問佛乘文通顯密佛乘可云耶答不爾難云今所𥳑顯二乘世間三種分齊也爾者大乘已上不可𥳑之隨而三種菩提心中勝義行願亘常途可知通顯密佛乘云事是以下終不以二乘之法文是𥳑二乘見如何答次下我今志求不求餘果文其上三種菩提心真言行者所發菩提心也何有顯乘耶但二乘言事大小二乘歟若又雖約過重舉二乘非取顯乘歟仍無失問不求餘果文此餘果中有顯果可云耶答不爾已上二條通二乘外道論義歟問瑜伽中諸菩薩身文此菩薩中有心王尊可云乎答不爾難云於胎藏界漫荼羅分別心王心𢿘時可九尊心王餘尊心數此通者心王中可有菩薩爾者今菩薩何局心數乎隨而瑜伽中諸菩薩文諸菩薩言無所限如何答今明心王心𢿘菩提心故上心王菩提心也仍約金界者五佛約胎藏者九尊也若願成已下心數菩提心也仍菩薩身中不可有心王也但諸菩薩言約心數諸菩薩可得意也難云上心王菩提心下心數菩提心事誰所定乎只今佛菩薩不同迄也如何會云發心𢿘菩提心由諸尊皆同大毗盧遮那佛身文此意發心數菩提心事同心王毗盧遮那故聞難云只此二段約佛菩薩不同也上約諸佛下約菩薩也但諸尊皆同等御釋實發諸佛菩提心事發菩薩菩提心事漫荼羅諸尊皆同毗盧遮那皆佛身故云意也如何此論義直二段不同可論之歟若又唱上文局心王菩提心歟可論之歟問我今志求菩提文所云菩提通三種菩提心可云乎答爾也難云今解釋意不求餘果心决定文此意全勝義捨劣得勝義也何通三種菩提心乎是以大師一處御釋欲入此乘以最上智慧簡知乘差別文取意尤此意也如何答三種菩提心當論所明法門也就中今菩提心心王菩提心也何此中無行願三摩地乎隨而三種菩提心通因果見是以下諸佛菩薩文但聞分自元通三種故無失難云三種菩提心行相各別也其中勝義心事如先行願心大悲心三摩地五部祕觀三密妙行也然者不求餘果義三種中約勝義心事尤分明也但諸佛菩薩等解釋事誠爾也但今先約勝義心釋之歟非退簡餘次心王菩提心故通事此意也如何問不求餘果文此餘果中有心𢿘菩提心可云乎答不爾難云對心𢿘菩提心云不求餘果可知心王菩提心外悉簡之事爾者尤此中有心數菩提心見如何答雖心王心數菩提心不同共是祕密佛乘上菩提心也何可𥳑心數菩提心乎但雖對心王菩提心所𥳑局顯見無相違也問自我今志求至大毗盧遮那佛身一段文發心修行證果三句具有之可云乎答局發心也難云以𨐫說意見之發心修行證果三句具見發求名官心發心修理名官行修行也仍發心修行分明也而後成其志是證果也以此𨐫說見法說文是尤可有三句若不爾者非法𨐫不齊乎就中付法說得意者我今志求等正是發心義常在人天是證果也求果心是修行也爾者如何答今書專明菩提心相故可偏局發心也隨而我今志求文偏是發心義也但譬說事菩提心上修行相也必非因行果中行次而後成其志正明發心位非指果也次人天等事且歎發心功能迄必非證果重也此論義可以答為難也問發阿耨菩提心文爾者所云心一字約能發可云乎答可爾也難云今心指菩提心也仍所發菩提心也下發菩提心文全與今題同也三摩地釋段應住普賢大菩提心或通達菩提心文是等意一具指所發菩提心名心見如何答論始當發三菩提文此意發求菩提心名發菩提心見爾者不可違彼釋故今可約能發也譬說意發求名官心文或發求財寶心文但下發菩提心任譬說見之發求菩提心釋發菩提心可得意也第三菩提心下釋非發菩提心義仍無失問心决定文限不求餘果義可云乎答不爾志求菩提心不求餘果事也問若有上根上智之人文爾者局心王機可云乎答不爾難云當段意若有等若言對心𢿘菩提心若願成等若言見爾者今上根上智人可心王菩提心機也就中今解釋意大師御釋十住心論第一云若有衆生有大度勇鋭則許大日所乘一體速神通寶輅文彼云大日所乘故局心王機見今大度量御釋全同也如何答當段意初總說心王心𢿘機當發如是心已下釋心王機若願成已下釋心數見若今上根人心王機取之不樂外道二乘法義但可限心王歟但若言待對事初若言對顯言也若願成等若言對我今志求等言也次大師御釋事彼別無心數機故難例歟問而後成其志文爾者指果位可云乎答不爾也難云今被明菩提心相時法譬合三節見爾上法說舉發心與果兼修行𨐫說中上二譬舉發心修行兼果後一𨐫舉果德發心兼行三句具說之見爾者而後成其志指果德見如何答而後成其志解釋雖一往似果德實與上譬一具約發心修行可得意也爾者而後成其志指修行位見隨而大師一處解釋中依當段意作釋時而後行其行文尤此意分明也隨而合說文意發菩提心修菩提行文但法譬合可得意三句云云釋段意不爾見違大師御釋也若又得意三句者法說如難𨐫說中舉因行兼果德可得意也仍無失問當段明名官財寶善惡三譬見爾者約三種菩提心明三譬可云乎答不爾難云既明三種菩提心時取三譬豈非約三種菩提心乎若不爾者何舉三種譬喻乎隨而譬意初譬當勝義心是捨劣得勝意也次譬約行願心明之是則以種種法寶授與衆生義也後𨐫第三菩提心善惡不二義也若又以第二譬約三摩地可得意是開示心內寶藏義能含種種無量珍寶文第三譬約行願心是同善惡機攝化利生義見爾者如何答取譬事為衆生易解故必不可立其由爾者不可形三種菩提心隨而大師一處御釋取遊客狂人𨐫如是取譬說事重重也不可強形之但配釋事一一難思求財寶義是貪求義也異與所化義也次善惡事必不見不二次明三𨐫故可配三種云云是又不爾取譬不可必局一故般若心經祕鍵一字多含𨐫舉帝網聲論龜卦爻蓍𨐫又即身義重重帝網名即身頌文下問魔宮震動文爾者所云魔四魔中何乎答約淺略者可局天魔約𣵫祕者可通四種歟問既發如是心文所云心通發心修行可云乎答可局發心也難云上釋發菩提心修菩提行指彼云既發如是心何但局發心哉爾者如何答既發如是心只云發心意也其上菩提心之行相者是菩提心之行相事已治定歟爾者尤可局發心也已云心何通行乎但雖上舉二義今且取發心方也是則當論先發心為本釋之故可局明發菩提心也爾者發菩提心必可修行故雖舉修行義付為本釋發心方也下諸佛菩薩昔在因地發是心已文仍無失難云修行可名心事強無相違大日經三句說三心同疏五轉釋自心發菩提即心具万行尤心言可置行何云心故局發心可云乎爾者上𨐫說已有發心修行合說文又爾也指彼牒前起後文何釋發心方乎問受勝快樂文以三善三惡對辦人天名勝快樂可云乎答不爾難云以三善三惡分別苦樂時人天是樂處也依之人天果報釋受勝快樂見爾者如何答今人天取三賢十地意者有漏皆苦故非以三善為樂處若又為兩部義者是又各別也又約三身佛果義也非如難也若又準難得意之天台補注法花若生人天中受勝妙樂文於天中得一實益方名勝妙益文此意於人天中𨵿一實益云勝妙樂見準之於人天中𨵿真言得益云快樂可得意若又如玄贊釋生人天受樂除諸根不具除諸根不具等過失其餘云快樂歟仍無失問瑜伽中諸菩薩身文爾者成諸菩薩身直名發菩提心可云乎答爾也難云發菩提心是法也諸菩薩身人也已人法不同也何以成諸菩薩身直名發菩提心乎可知為取諸菩薩所具菩提心舉諸菩薩身仍非直取人也如何答所偏任解釋也但自宗意人法一體為宗旨故直指人名菩提心事不可有相違釋摩訶衍論言諸佛者即是不二摩訶衍法文大師問諸尊皆同大毗盧遮那佛身文爾者成諸菩薩身名發菩提心由釋之可云耶答爾也難云問發是心文所言心指何法可云乎答指菩提心也問以三種菩提心為戒可云乎答爾也問昔在因地文所言因地局諸佛因地可云乎答不爾難云如諸佛當位果故昔在因地義分明也如菩薩是當位因地也何此外有因地乎爾者雖舉諸佛菩薩約勝指諸佛云昔在因地見如何答云云問即身成佛文通理具加持顯得三種即身成佛可云乎答可爾也問三摩地文名三摩地菩提心意如何答三摩地翻等念此意也難云大綱三種菩提心大定智悲三德也仍三摩地名約定也隨而第三菩提心釋云又乘散善門中文此意顯為散善門對之密為定故三摩地定義也見如何答祖師御釋三摩耶翻等持三摩耶譯等念以之為正翻爾者三摩地可等念義是則平等護念義也諸佛衆生平等護念義也第三菩提心下諸佛大悲以善巧智文若約衆生得意者真言行者觀念心佛平等道理名等念可得意也但聞分非正翻次下御釋事必非三摩地意可得意也問為修習之人猶如己身文今此一段行願二字中但願釋也可云乎答爾也難云牒初行願釋為修習之人等可知通釋行願二字事若初願釋得意者所言利益已下行釋取義歟爾者行願釋次第無之其上行願菩提心一段初略釋行願所言利益下委釋見爾者如何答凡得意行願二字不同依內心願正成行見爾常懷如是心等解釋內心願分也所言利益者已下正作出世行令衆生安住無上菩提爾者今此一段文局願釋歟但行願不次第之事逆次釋之歟若又雖名字行願云其義時可依願發行故先願義釋之歟次今此二段相似略廣二段文依利益安樂內心願正作外行義釋之時舉願利益安樂故牒上委釋解釋相似也若通行願二字者付今一段文以何為行乎又所言利益已下文以何為願乎以此意五大院等大願行二段得意文也難云今此一段不限願釋事如以前重難隨而大師一處解釋中三昧耶戒序觀一切衆生猶如己身及四恩是故不敢殺害其身命是則由大慈悲行願故文此意分文可得意事不知深意先猶如己身義通名行願事分明也或又表二大悲心者以猶如己身論文釋行願義是等意一具通行願二字見但五大院分別約為靣分別之歟爾者如何會云云云問所言利益文今此利益一段能化教法但限真言可云乎答爾也難云當段意所𥳑但是二乘法也知能化教法取顯諸大乘已上云事若限真言教法何可𥳑二乘乎隨而皆含如來藏性證據殊被引花嚴經就中三種菩提心中勝義行願二心亘常途義門有之爾者何局真言教法乎答案利益安樂二段起盡下安樂段隨衆生願與之故可廣通今利益段意約真言行者本意明之故能化教法不可通顯諸大乘歟大方雖三種菩提心不同皆明真言行者即身頓悟相若利益段顯諸大乘為能化教法難云真言不共三種菩提心乎其上舉所求果云安住無上菩提是則當論題阿耨多羅三藐三菩提心文或菩提心觀行文或我今志求阿耨多羅三藐三菩提文下云何能證無上菩提文或是證無上菩提文此等皆指真言果爾者今可真言果仍能化教法可限真言也但被𥳑二乘事約過失重歟例如蟭螟大鵬相望若又舉二乘事大小二乘歟次引花嚴經文事助證歟若又疏家解釋意花嚴經依阿闍梨所傳具淺略深祕二義見爾者以深祕義引之歟仍無失難云既所被簡是二乘也何可𥳑大乘已上教法乎付之云大小二乘事今論證據無之次約過重事是又文起盡無之爾者以何道理局真言可云乎但利益安樂等不同事安樂廣通世出世利益限大乘已上見爾者無相違次云無上菩提事能化教法雖有顯密可終入真言果故無相違次花嚴經文事會云當段意𥳑二乘由釋之一切有情文此意於大乘中如法相談五性各別故不談一切衆生悉有佛性義歟爾者可取大乘事先難得意知今能化教法局祕密事所期果既祕密也爾約當事是又難得意勝義心意皆舉當分果當段何替彼不許當分果乎賴瑜法印此論義難文一處御釋八種法門文出之是不爾彼八種法門釋依方便引進文故不依當段意歟但異義也教法施二乘事如常問利益安樂文利益安樂不同如何答利益約出世安樂通世出世也難云利益段約出世事勿論也安樂段通世出世事難思若通世出世者利益段出世安樂段中出世其不同如何可得意乎隨而見解釋意又於大悲門中使令悅樂釋之安樂義偏約世間施門結成之爾者何云通出世乎答既親近已下正明出世得益故安樂段通世閒出世事分明也但結使令悅樂故非安樂釋事是且約世閒結之也中閒結名字事起信論真如廣說段結唯是一心故名真如重真如義釋此一切言說可準知之次利益中出世安樂中出世不同事利益約真言安樂段廣通顯也若又利益段雖通顯彼取大乘已上今真言行者方便引進文可通小乘等教也難云既親近已下釋非安樂當分釋凡與世閒益事為令自是入出世無上菩提故安樂義結成悅樂是本意明出世益見爾者此出世益立還可當前利益段也是則上約出世明益為不堪彼益安樂段以世閒益與之因此世閒益令入前利益出世義也仍安樂段偏世閒也凡利益安樂不同事篇篇釋見其中利益出世勝善安樂世閒勝善分別義全同也次利益出世安樂出世似無其不同然今有所限下可廣通云云縱雖有通局不同其中安樂出世大乘已上利益出世不同猶以叵分者也如何會云云云問真如智慧文爾者真如與智二種為所覆可云耶答爾也難云下明顯現相一切智自然智無㝵智文豈非局智乎然者今真如智慧者取證真如智見是又釋論正體智名真如智尤符順彼隨而流布經如來智慧文指真如不見如何答理智共可所覆故今舉理智也隨而經文真如智慧文豈非二種乎但下說智事舉智顯理歟能證所證不二故次如來智事舉如來取所具理歟若又如說真如名如來真如名如來見仍無失
