body:
  text: 快全口問如來藏性文所言藏者含藏義也可云乎答覆藏義也難云自宗意名如來藏事以含藏義名之見如來藏者六大四曼三密本有三大可名如來藏爾者包含諸德義以可名藏見如何答所任隱名如來藏顯名法身文也隨而當段引嚴經但以妄想等文尤被隱煩惱不顯現義見隨於自宗為煩惱被覆事大日經疏為無明煩惱戲論重雲之所覆障文又大師褰霧見光無盡寶文仍藏覆藏義也但諸德包含義不可強遮之雖爾如來藏得名是約隱覆也難云自宗意如來藏者是菩提心也故經云理趣釋經外金剛會品是故如來説一切有情如來藏以普賢菩薩同一體也文此意指普賢大菩提心見然第三菩提心名普賢大菩提心釋此菩提心時此菩提心能包藏一切諸佛功德法故文是以含藏義名藏見但聞分自宗釋必非覆藏釋歟次隱名如來藏釋一往也實如來藏義有多義也會云問妄想顛倒執著文所云三種其體各別也可云乎答爾也難云妄想顛倒執共是煩惱通名也可知一法以三種名説之事隨説離惑顯得義若離妄想文此意三種名不同其法體同故云妄想歟如何答妄想能生根本無明也顛倒執著枝末煩惱也即人法二執也仍三種不同也以妄想為能生事下夫迷途之法文若同體者三名各別舉之事豈非繁言過失耶但下若離妄想等御釋根本盡故枝末皆無意也若又舉一示一説歟次煩惱通名也事實爾也但三名重舉之可別屬也仍無失問不敢輕慢文此一句指安樂當分可云乎答爾也難云又於大悲門中已下正釋安樂義見又於言是對利益段詞也爾者至謂行人不敢輕慢承來上利益段為安樂段起因見如何答不敢輕慢一句屬安樂當分事至成佛故是承來釋也是則於安樂段不輕行大悲門二段見若取此一句上承來者上利益釋無不敢輕慢義若無之者何可云承來乎隨解釋意覺知畢竟成佛故今不敢輕慢見故言置不字上尤其由也但今又於言對不輕行見何對上利益段乎若對利益段行願心共是大悲心也又於大悲言難得意可知對不輕行事難云又於大悲言事對利益段事尤分明也然共大悲門故難思云云但雖共大悲門也上大悲中智也故覺知一切衆生畢竟成佛尤約智今不簡善惡隨順衆生願大悲中大悲也若又上大悲利益段不得度人又大悲中安樂段得度之得意無相違若又上利益段大悲拔苦今大慈與樂義見無相違也次上不輕義不見事一切衆生成佛義文不分明而云皆含如來藏性故以義承來之然者今不輕義雖文不分明可以義得意也故言事上段不輕義知畢竟成佛故意也如何會云上段文義共不輕義不見一切衆生成佛事文義共分明也承來故文言不同歟次故言事上有不輕義者可爾文無之故猶潤色也問又於大悲門中文爾者對利益段又言也可云乎答可對不敢輕慢行也問隨衆生願方便引進文爾者付此一段分四攝行事如何答隨衆生願使令悅樂布施既親近已信任師言愛語因其相親亦可教導利行衆生愚矇不可強度真言行者方便引進同事也問隨衆生願文爾者以邪法隨衆生願與之義有之可云乎答依一義者可爾也難云行願大悲意令衆生入無上菩提見然若為衆生與邪法者衆生沈淪苦海不可出離爾者難思如何答約真言行者本意者但以真言醍醐妙藥可度生然為不堪之人今大悲門前以世出世教與之也爾者縱雖惡法先與之後誘機根可令入菩提心也當段衆生愚朦等御釋尤此意也但聞分為方便與之故無相違問又於大悲門方便引進文爾者此一段能化教但以真言上種種教法與之可云乎答不爾也難云已能化人真言行者也何所與教法可通顯教法門乎然者可悉真言上教法大日經云或聲聞乘道或緣覺乘道或大乘道或五通智道或願生天或生人中及龍夜叉乾闥婆乃至説生摩睺羅伽法文此意隨種種性欲所説法門三乘五乘法門有之見今真言上通別方便教法隨機與之義見如何答當段御釋意乃至身命而不吝惜文是尤與顯行義分明也隨應機故不可限祕密若有顯機可與顯教法也但大日經文若彼唯密可得意所化機可但密機故今可對顯機故相替也若彼文大師引第三住心意者自元對顯機説顯法門可見故無過問觀一切法無自性文相説旨陳總句也可云乎答不爾難云雖相説旨陳不同共觀諸法無自性爾者今説觀一切法無自性二段總句也覺意勝義心一段初表菩提心名觀一切法已下釋其義此中初總釋凡夫執著下別釋別釋中分相説旨陳二段見爾者如何答旨陳總句下表又深知一切法無自性云何等爾者今觀一切法等局相説總句見但雖無自性義通今先別屬相説總句可見也次文段事初表觀一切下別釋此中初相説後旨陳也此中各有總釋別釋可得意也仍無過難云準行願心釋初釋初行願者等略釋利益安樂二義所言利益已下二段各別釋之見爾者三門一具得意今可通相説旨陳也但下旨陳總表別舉旨陳總表歟例如釋摩訶衍論總問何故名生乃至名滅答彼初釋生相得名後住相已下別又問以何義故説名為住等釋其義問三毒文此三毒同時俱起義有之可云乎答爾也六十心同時起故也問二勝義者文爾者今此勝義無自性觀門但觀法歟又可云人觀無自性乎答人法共觀也難云二勝義者觀一切法無自性文或又深知一切法無自性文大師御釋戒序諸法皆從緣生無自性文仍勝義無自性觀但局法見如何答可通人與法也依之五大院等一往相説旨陳分人空觀法空觀見隨見解釋初表凡夫執著或又諸外道等文或二乘之人等文是等意必不局法也但被表一切法無自性事非人法分別法也是則万法總云法仍總名也意人實依他法故也次大師御釋此意也隨次下戒序是故異生羝羊凡夫文仍無失難云今表二乘之人是為取所具法也故云外道之法或云勤修本法等或云智慧狹劣又云所習法教是等一具取法也爾者以總表一切法文是為本釋故限法見雖舉人是正舉法能具人也所取者可所具也問云何無自性文依此問所舉法何乎答問行三毒五欲文爾者此行真言行者可厭患乎答爾也難云凡真言行者應所化機根與教法令利益是尤通大乘菩薩用心別真言功能也厭行三毒五欲人豈非漏機乎又上安樂段意隨衆生等文違前文段釋如何答所任解釋也但今非遮人也捨劣得勝時厭三毒五欲惡心義也若大悲門時此人以方便可引進之也次上御釋大悲門前故以方便攝機也此時真言行者行三毒等事不可有之也問或助以藥物文爾者以藥力助前業延壽命義也可云乎答助身命義也難云依前業力感現世果故於身命者可治定何以現世藥力可延壽命乎若爾者身命可非異熟法可知以藥力助先世業得長壽身事答任又諸外道等戀其身命御釋意以藥物助身命見但聞分非相違其故以藥力助身命事以藥物力引發古業延壽命故推功是藥力所為也若又俱舍經部師妙音師以壽命通非異熟法性相立之爾者如何問仙宮住壽文爾者得仙宮住壽事但依藥力可云乎答爾也難云當段御釋意舉仙宮住壽二類應觀彼等業力等文此意依業力見隨案性相意以命根為異熟果無彼能感業力者何得長壽乎爾者尤可依過去業力如何答依藥力得長壽事是所任解釋也其上案道理人中果報不幾一期壽限尪弱也𠰥得仙身不轉生可得多歲爾者依先業所感果報是決定故是已後壽命可依藥力也但下云業力等事藥力是業因云業必非云前業也次以命根定異熟果故𠰥無先世業力者不可延壽命云云是實疑難分明也付之經部釋延壽行云彼阿羅漢由此自在三摩地力轉宿住業所生異熟諸根文依此意者以藥力實轉過厺業延壽命歟準彼羅漢延壽行仙人如此歟又俱舍師中以命根非異熟定之歟此意者不依前業事可有之也難云𠰥以現世藥力延壽命者非異熟果段分明也爾以命根為異熟果此總報或置第八識或置第六識不同有之付之經部師妙音師以命根通非異熟一義立之違常性相故難思其上其意何事乎爾者以藥力助先業感今生延命可得意也何偏依藥力乎會云任一師所立義者於其道理實難覺悟也羅漢等修延壽法時住無貪行之延壽命見必依過去業所不見也可思之問沈淪苦海文爾者墮苦海業力於上界造之耶答爾也難云於上界者作生下地業不可有之其故業必依煩惱已於上界能發煩惱無之何有所發業乎是則性相定也如何答小乘性相爾也但大乘意不爾於上界能發煩惱可有之故又可得意所發業也隨今惡念旋起文隨一師釋於上界作下地業受報必起邪見來生地獄文大方大乘意雖伏現行生上界種子猶存之故可有發業煩惱歟唯識論云問沈淪苦海文所言苦海局三惡趣可云乎答可通六趣也難云今解釋意業力若盡等文此意盡業力位未離三界惡念旋起沈淪苦海見爾者指三界外苦海見隨以六趣分別善惡時以人天為樂處仍天樂盡所墮苦海局三途見隨依惡念墮可見之如何會云婆娑論釋退沒處有説生地獄有説生惡趣如是説説不定也欲界處所不定或生惡趣或天或人文問又二乘之人不可樂文爾者今此一段大師引何住心乎答四五住心也難云四五住心偏明聲聞緣覺當分行相依之所依大日經中説沈人空湛寂理義説初劫分劑不及大乘初門義然當段論文明二乘回心向大旨述漸悟菩薩僧祇行是於大乘行有漸悟頓悟二類中漸悟菩薩也見仍今論文共明大乘中頓漸行見初明漸悟菩薩行次又有衆生已下明頓悟菩薩行見爾者大師御引證深意如何答所偏任御引證解釋也但至論文者實如所難但明二乘當分行相時不明回心義趣本涅槃已為究竟文仍本意當分也明回心義事是二乘已後回心也回心已後經三祇久遠成果釋之為顯當分狹劣意趣故當段所用二乘當分也依之引之也隨結釋聲聞緣覺智慧狹劣亦不可樂文若取回心已後者何可但云聲聞緣覺乎仍無過難云文段意趣事實難計雖爾明二乘事是釋明二乘回小入大事論釋意趣必回心義非本意道理猶以難極歟爾者大師御引證𣵫意不顯歟但結釋云聲聞緣覺智慧狹劣事從本立名也意聲聞緣覺回心成大乘菩薩云聲聞緣覺必非當分也若又取當分意趣者大師何可引明回心文段乎會云若如所難者非凡夫外道次闕二乘乎次引當觀已下事非正證為顯捨劣得勝義引之歟若又論文意如本次從本立名會釋事今前後無其例也問明四諦十二因緣觀見爾者如次淺深觀也可云乎答爾也難云四諦觀門盡有漏無漏因果立之如十二因緣偏盡有漏因果剩十二因緣猶淺見何淺深次第可云乎隨緣覺正斷惑時用四諦觀見是以他師釋云此但據加行位説若當入聖必作諦觀文此釋意十二因緣所加行位用觀相也正以四諦斷惑見如何會云大師依當段文為第四第五二箇住心尤可淺深但十二因緣事雖明有漏因果微細分十二釋故是深也四諦粗分之故淺也但無無漏因果事還滅十二因緣即無漏因果可得意也次緣覺觀四諦斷惑事是又通三乘共觀之故無相違歟若又大師十住心論第五於最後身值佛為説十二因緣而得悟道釋之淨影師大乘義章十七觀十二緣而得道者齊稱緣覺判之是等意非依十二緣乎爾者一師釋不可依用問明諦緣修行見如次局聲聞緣覺修行歟將互通修可云乎答可通修也難云處處釋文各別舉之如何答智證云但中乘觀多遂因緣悟道非是不觀無常等四諦若聲聞多先觀四諦得道非不觀因緣文吽字義緣覺亦觀十二因緣四諦方便等文又大乘義章卷十七緣覺雖觀因緣亦別因緣作四諦觀文但聞分一往分別也問四大五陰畢竟磨滅文爾者二乘一分得法空可云乎答不爾難云今御釋意斷四大五陰見淨影釋云小見法空文又如六宗中諸法但名宗豈非斷法執乎答當段雖破人執等文或破衆生執文疏謂如是解唯蘊無我等文但四大五陰御釋析法空歟意為空人我析破法也如大日經疏第三釋若又云畢竟磨滅指入無餘位歟淨影釋執取計名中計名為所知障釋之歟若又可遮之歟問但淨意識不知其他文所言意識悉淨之可云乎答不爾難云大師御釋無七八文當段不知其他文是等意分明淨第六識見就中第六識人執相應識體也二乘斷人執何不悉淨之乎答於第六意識相續相相應故實不悉淨之也若又法無我未淨故人無我亦不清淨意者實人執不悉淨歟仍無失問二乘人知七識可云乎答不爾問勤修本法文所云本法何法乎答三十七道品也難云聲緣二乘所觀法門是十二因緣四諦也隨而當段上舉之又大師御釋以此二種為二乘所觀何不指彼乎答經中云又大師御釋云三十七品為道助文聞分必非本法歟問久久成果位文所云果位指無餘涅槃可云乎答爾也難云二乘中一生成果相有之何可云久久乎知今果指佛果也故一生證無餘涅槃久久可至佛果故云久久見如何答二乘當分果位見回心以後果下別釋之也但一生機根事小分也仍今約多分也是則經三生六十四生百劫入無餘故云久久也問劫限等滿文所云劫悉盡涅槃經五果回心法花一念楞伽時分説可云乎答不爾難云當段意定入無餘劫數見此中何悉不盡之乎答涅槃説可有之歟如楞伽香象元曉等釋揔相説總説八六四二万十千劫時分見次法花一念回心正文不分明歟仍付定説者指八六四二万等時分可見也問宿信佛故文爾者回心直因可云乎答爾也難云以佛菩薩加持力為直因回心見過去信佛非直因如何答以過去信佛為內因以今佛菩薩加持為外緣回心也是以五教章云悉有佛性力為內熏因故如來大悲力外緣不捨故文問聲聞緣覺智慧狹劣文被簡聲聞緣覺當分可云乎答爾也難云舉二乘當分回心已後經三無數劫成佛義舉之結成之凡對真言者尤可簡回心已後也爾者何除彼乎答當段意為簡二乘當分舉回心已後劣事故約本意結聲聞等歟若又雖二義相並結一義事常事也仍可通回心已後事還難思若回心已後者可云大乘菩薩何云聲緣乎問八六四二万十千劫劫數回心已後經之可云乎答不爾難云香象五教章云入涅槃後起回心修十信行信滿心已堪入十住初發心住位已來隨根利鈍各徑彼劫未必一向在涅槃中徑爾許劫也如直往人既徑一万劫修信滿足堪能發心彼獨覺人根最利故亦似直往人徑一万劫餘四鈍根又差別故文又淨影釋云大乘義章第十七答云大師釋十住心論第四云香象釋云此上七位並是定性二乘要入寂已方乃回心文又經文云聲聞緣覺八万六万四万二万一万住處名為涅槃文又天台妙樂釋云復經八万劫畢方發大心文寶師釋云入於涅槃者入小乘無餘過八万劫者顯涅槃劫數文但淨影釋異上來説文也次香象釋表又有義等故非自義歟問劫限等滿文所言劫涅槃經所説八六四二万劫也可云乎答爾也難云涅槃所説時分不愚法二乘回心善趣位所經時分也爾者今劫限等滿義定性二乘入無餘劫數也何舉不定性人回心已後劫數可云乎隨香象大師等一義八六四二万等時為回心已後所經淨影師意尤此意也如何答涅槃所説劫數入無餘劫數也事處處釋文分明也如上引之爾者今是可指彼也若不爾者何劫數乎但至香象一義者會釋如前論義淨影師釋事涅槃經文取回心已後所經歟然經文分明入於涅槃是人未來過八万劫便當得成阿耨多羅三藐三菩提文違經文相連故彼師釋難依用也難云今劫數可依楞伽説也隨大師吽字義決定二乘文此意依楞伽説云沈醉昧酒不覺不醒然舉決定不定尤是與當段同也爾者如淨影一師釋者八六等時分是可回心已後時分凡得意道理時入無餘盡三界惑身心都滅依之云無餘爾者何此位可存八六等不同乎但經文事準淨影釋見之強無苦歟假令彼經文意實取回心已後也然文前後得意也隨涅槃經意不説不定性人入無餘云云若彼文定性人入無餘義者似彼經闕不定性如何會云若如所難見之者定性人回心是尤規模也何不明定性人回心乎還難思次大師御釋楞伽説自元八六等總説也故約總説以楞伽説意釋之歟香象大師并新羅元曉等云總相説也次今劫云無量劫不覺義今云限以劫數故不同也仍無失次身心都滅事宿信佛故義也難云已雖無量劫也回心時無相違歟例如三乘時分或説無數劫或云多劫然起信論云皆經三阿僧祇劫也此論義等為得意同事記之也肝要淨影八六四二万等為不愚法人回心已後時分以楞伽無量劫不覺為定性入無餘時愚法與不愚法是雖有異義指定不定歟得意八六四等時分事勘文集之可有稽古嘉祥大師等經八万等回心菩薩乘所到位釋四十心中十信也問復經三阿僧祇劫文第六他緣大乘心菩薩悉經三祇可云乎答爾也難云衆生根性万差修行時分非一也何悉經三祇可云乎是以慈恩釋云不經僧祇經十六劫文彼宗本論疏上云精進菩薩超衆多大劫文爾者如何答對上回心菩薩三無數云復經明知漸悟直往共經三祇事是以大師御釋三祇證法身文或六度万行三劫習文瑜伽論云即經三無數劫方乃圓證文彼宗決定無轉無數大劫文但慈恩釋只經地前十六劫入初地意也十六劫者地前一僧祇分十六也不經僧祇者生死無邊餘心劫數也餘心劫者無記心等位所經劫不入僧祇善心相續已上入僧祇也仍利根菩薩不經此餘心劫無記心入初地意也次超大劫者超中劫義也善戒經云若有菩薩勤精進者能轉無量中劫文地持論云若菩薩增上精進能轉中劫不能轉大劫文仍無失難云彼宗意約依他如幻理何無亂時義耶是以彼宗問此時長遠何日成佛引攝論答此義處夢謂經年悟乃須頃故時雖無量攝在一剎那文此意三祇攝一念見但大劫文指中劫云云是又彼本論云或有能轉衆多中劫或有乃至轉多大劫文豈非轉大劫乎會云如幻理各別也是已攝一念三無數大劫也次彼宗本論文事引彼釋云名上精進或轉衆多中劫大劫決定無轉無數大劫文仍無失問六度万行文所云六度万行不同如何答問復經三阿僧祇劫文所云復言對何法乎答對上漸悟菩薩三阿僧祇也難云今解釋意於第六住心初述修行軌則對彼云復經三祇意也何文段各別指上可云乎下亦超十地亦言對一段中也答迂回直往不同共經三祇故對彼事尤其義分明也但文段各別也事不爾又有衆生又言對上各別文段也仍無失問皆悉具足文通上復經三阿僧祇與修六度万行二義可云乎答爾也難云案具足言是約修行見若指劫數可云皆經何可云具足乎隨前後解釋皆劫數或云復經或云三無數劫如何答上舉所經修行云皆悉具足何可除時分乎隨次下久遠而成斯由所習法教致有次第文此已舉二何皆悉具足義局修行乎皆悉言修行所經二故云皆悉歟修行一種者不可及云皆悉歟但具足事實一往似修行但此菩薩若不經劫數可闕三祇對不經之人經三祇云具足何相違乎問無不遍修文悉遍修行可云乎答爾也難云如五相三密是真言行也又性宗已上行體是又不可修行如何問如前觀已文指何文乎答指二乘釋段也難云指上又有衆生已下一段文意也意今法相大乘人經三僧祇劫修六度万行故不可樂此人觀已解釋意也如何答指二乘釋段可有二意一取回心已後釋也意回心二乘已是大乘菩薩故相同今菩薩故指彼云觀已歟若又可準據釋二乘人智慧狹劣故不可樂今大乘觀可得意意趣歟但可對上又有衆生事必無自性義彼文不顯歟問又有衆生十地菩薩境界文今此一段文明勝義無自性可云乎答爾也難云如前觀己者是則指行願菩提心意如前行願心觀十方含識猶如己身觀已發行願大悲心可得意也爾者非勝義無自性如何答如前者非指行願心也前二乘段歟爾者如前二乘今真言行人可觀無自性意也但聞分勝義無自性觀中舉第六住心不説無自性過有之故無相違問無餘衆生界一切衆生文所云一切衆生指能化可云乎答不爾難云今解釋意無餘衆生界是所化生界也上行願段無餘有情界文彼全同也然者今云一切衆生能化心也意利樂無餘有情界發金剛薩埵心意也真言行者可信金剛薩埵故經云一切衆生所有心堅固菩提名薩埵文今論法爾應住普賢大菩提心一切衆生本有薩埵文如何會云上云界故約依報歟下取能居人云一切衆生故若又上總廣舉之下為顯不漏一人義重舉之歟問從凡入佛位文爾者佛位者指真言佛果可云乎答爾也難云入佛位者是對顯乘行體真言意修佛地三昧道故雖因位約所修行云佛位也必非證位也上云修瑜伽勝上法尤此意也大師一處御釋云所修之行也非謂所得之果文此意尤依當段釋見如何答指真言頓成旨時從凡入佛位文是則不轉肉身等釋意也下若人求佛慧文第三菩提心釋云欲求妙道文或若心決定如教修行文但聞分一往爾也但隨機雖入佛地行不證果人可有之雖爾今論意明頓悟故可準知上下文也次大師御問答御釋事問今論約行願心所超云凡夫二乘約三摩地云十地真言意三種菩提心共可超常途二乘凡夫十地如何如此釋之乎答且約一邊顯一邊歟問外道二乘文分齊如何答世間三種住心聲緣二乘也問一切法無自性文爾者捨劣得勝觀限勝義心可云乎答不爾難云案三種菩提心不同行願心是大悲化他勝義心捨劣得勝無自性觀也第三菩提心五部祕觀三密妙行是也爾者三種菩提心各別也何無自性義可通二種乎答三種菩提心一往分別也爾者於行願心大悲決定故過外道二乘如三摩地修瑜伽勝上法從凡入佛位事非十地菩薩境界是等豈非行願三摩地上捨劣得勝義乎但聞分一往也問當段舉行願三摩地明無自性義意如何答顯三種菩提心各具三種不離義也問從凡入佛位文明一生頓悟義可云乎答爾也難云期佛果人皆從凡次第轉升至佛位此至佛果中間經次位教教不同可有之也爾者從凡入佛位解釋必不顯頓悟經多劫雖成果不從凡入佛位者如何證入乎如何答今解釋不轉父母所生血肉身入佛果義也問從凡入佛位文頓漸超三機共具有之可云乎答爾也難云今解釋意自凡位入佛果義故具經諸位至佛果漸機等難得意爾者約頓超二機見如何答真言行者自最初安住佛地三昧道作自心即佛觀解故三機共可有之也若又雖中間經諸位一生間至佛果故云從凡入佛位有何相違乎問𣵫知一切法文所云深言簡上相説菩提心詞也可云乎答爾也難云大師一處御釋意必簡相説詞不見證相説十住心時以下戒序釋文為欲簡擇如是諸法教發第三勝義心亦名深般𠰥心文至終為知此乘差別發深般𠰥勝義心文爾者如何答如相説約假相觀之故淺觀也今旨陳菩提心約性觀之是則深觀也仍為顯此起盡至旨陳段置深言見但大師御釋深般𠰥妙慧上有相旨二段故約總釋之歟然論主今別約旨陳置深言也問旨陳段無自性義真言行者無自性觀也可云乎答爾也難云思大師住心御引證以今此文為七八二心了轉深轉妙皆是因文此外真言行者釋真言密教法身説文爾者如何答是明真言行者無自性觀見隨大師戒序以深般𠰥觀無自性故自然離一切惡修一切善饒益自他衆生即是三聚妙戒具足無住祕密三摩地亦復如是住此乘者以此戒檢知自身心教化他衆即是祕密三摩耶佛戒也文但大師御引證淺略一邊亘常途故也問論文當知一切法空心源空寂文大師證何住心乎答證第七住心也難云案論文意上引諸法無相為虗空相文了釋成當知等尤大師諸法無相等經文證第八住心其義同也何况不見身心真實之智文全同儀軌不見於身心住寂滅平等究竟真實智文然彼儀軌次下指彼位云汝之所證處是一道清淨等爾者尤符順第八住心今何大師證第七乎答任大師御引證也隨已悟法本無生句同經覺自心本不生文也但至難者上引諸法無相等經文了結名勝義菩提心當知已下各別文故無相違若又雖轉釋上為第七住心事無相違例如轉釋佛莊嚴藏次至儀軌文者實是第八住心也但以彼為第七住心義可有之次當段御釋一道清淨心住於如實際義門事自元此道理通第七第八然今證第七見無相違歟此事可有沙汰只今依無稽古不委記之也問今以旨陳文旨陳得名如何答旨陳本旨義也難云云云問迷途之法文所云途指法性正道可云乎答爾也難云迷途所生枝末煩惱也然者二字共可屬煩惱也隨大師十住心論第一來途無始歸舍幾日文又下對治迷津文是等意一具也如何答凡無明煩惱迷正道故起見不對正道者何有迷義乎是以釋摩訶衍論云第四一切無明若尅其本無自體相依止本覺而得成立譬如迷道路人依道路迷若離道路無迷亂事文本論衆生亦爾依覺故迷若離覺性則無不覺文但下御釋是當段一具津約正法可得意也大師釋寂滅之津故次來途等御釋對歸舍來途共為妄流轉歟當段事異歟問從𡚶想生輪回六趣文何不舉業乎答舉煩惱兼業也問煩惱自𡚶想生可云乎答爾也難云實教意談真如緣起何從𡚶想生可云乎答今準法相歟𠰥又隨上下二轉有力無力不同也下轉緣起時𡚶法有力故約為靣釋之歟問𠰥覺悟已文何今自細麁次第斷惑乎答必非約斷時次第也難云對上流轉明還滅相何不約斷時次第乎答覺悟位總離煩惱義釋之時以根本盡故枝末皆無意釋之仍斷時正從麁至細可斷之也問能生云止除所生云法滅其不同有之乎答必不爾也問諸法門文此中有法身説法真言密教可云乎答然也難云上釋從真起用彼真者自性身用者報應二身也爾此二身對機説法釋諸法門見何此中有真言密教乎答體用相望有重重故若於法身上得意體用者無相違若又自宗意四種法身具陳斯道故無過問應病與藥文爾者自宗有對機説法義可云乎答爾也此事如常問如大毗盧遮那經等文爾者通相説旨陳二段引證可云乎答不爾難云上釋相説旨陳二段了引經文結作是觀已名勝義菩提心何局旨陳乎其上相説段無引證可知今經文通二段證事爾者如何答因旨陳釋引今經隨經文意説無自性義尤可限旨陳也相説約人假相説之故無自性義相替也但相説段無引證事其義麁顯故歟𠰥又引證有無必不可成由歟次作是觀已等結釋總結上二段歟仍無失問旨陳段有第八住心可云乎答爾也難云見大師引證靣以論文屬當無之見如何答以諸法無相等文可得意也別不引論文事直引大日經文故不引歟難云今此經文證第八住心故可有第八住心云云釋義引證可一具然經文説之者論文可有之𠰥論釋無之者所引經文不可有之答云云問万德斯具妙用無窮文大師證何住心乎答第九住心也難云心源空寂義已亘七八二心今二句何限第九乎隨論意談佛果万德義述適化無方義依之大師以性德圓滿本智具足論文證之如何答深意叵測但心源空寂義同三論一心寂靜言亡慮絶妙理也万德斯具妙用無窮尤花嚴圓融無得具德故證第九歟但三論性德其義相異歟大師指第七寶鑰下卷万德始顯一心稍現文指修得義歟難云𠰥約修得義者第六住心可有此義仍性德邊證第七事釋論文分明也隨大師又以清淨本覺引第九住心其上於同性德內分不同者其不同如何又當段万德等二句異第七住心㨾也如何問𡚶心𠰥起文局八迷戲論可云乎答不爾也難云對心源空寂三論獨空畢竟理云𡚶心等可知局八迷事爾者如何答今論文明真言行者觀相故不可限八迷但引第七事遮情一邊亘故也問万德斯具文證何住心乎答第九住心也難云万德斯具等義是顯祕密莊嚴本具見如何答約實可爾今以一分同方為第九歟問發心畢竟二無別文文意如何答如文難云發心初心畢竟究竟也何無二乎答雖初心究極異大悲心同也𠰥又歎發心功能也問初心菩薩發心何同果地大悲乎經中説我慈悲未滿足文爾者如何答分同義歟釋論一分智用與如來等文此意也時寬文六歲次丙午仲春吉旦剞劂氏中野氏小左衛門尉刺虗白子雲農操觚焉
